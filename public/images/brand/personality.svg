<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="560" height="200">
  <rect width="560" height="200" rx="16" fill="#F8F9FC"/>

  <!-- 6 personality traits as visual cards -->
  <!-- Row 1 -->
  <!-- Calm -->
  <g transform="translate(14, 14)">
    <rect width="168" height="80" rx="12" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <!-- Flat calm line -->
    <polyline points="16,50 36,48 56,50 76,49 96,50 116,48 136,50 152,49" fill="none" stroke="#3B3F8C" stroke-width="2" stroke-linecap="round"/>
    <text x="84" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="23" fill="#1A1D2E" font-weight="700">Calm</text>
    <text x="84" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="21" fill="#6B7085">차분한</text>
  </g>

  <!-- Analytical -->
  <g transform="translate(196, 14)">
    <rect width="168" height="80" rx="12" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <!-- Bar chart -->
    <rect x="28" y="52" width="16" height="14" rx="2" fill="#3B3F8C" opacity="0.25"/>
    <rect x="50" y="42" width="16" height="24" rx="2" fill="#3B3F8C" opacity="0.4"/>
    <rect x="72" y="36" width="16" height="30" rx="2" fill="#3B3F8C" opacity="0.55"/>
    <rect x="94" y="28" width="16" height="38" rx="2" fill="#3B3F8C" opacity="0.7"/>
    <rect x="116" y="22" width="16" height="44" rx="2" fill="#D4A843"/>
    <text x="84" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="23" fill="#1A1D2E" font-weight="700">Analytical</text>
    <text x="84" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="21" fill="#6B7085">분석적인</text>
  </g>

  <!-- Patient -->
  <g transform="translate(378, 14)">
    <rect width="168" height="80" rx="12" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <!-- Slow rising line -->
    <polyline points="16,56 40,54 64,52 88,49 112,45 136,40 152,36" fill="none" stroke="#3B3F8C" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 3"/>
    <circle cx="152" cy="36" r="3" fill="#D4A843"/>
    <text x="84" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="23" fill="#1A1D2E" font-weight="700">Patient</text>
    <text x="84" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="21" fill="#6B7085">인내심 있는</text>
  </g>

  <!-- Row 2 -->
  <!-- Mentoring -->
  <g transform="translate(14, 106)">
    <rect width="168" height="80" rx="12" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <!-- Two lines converging (teacher + student) -->
    <polyline points="16,54 40,50 64,46 88,42 112,38 136,34 152,30" fill="none" stroke="#3B3F8C" stroke-width="2" stroke-linecap="round"/>
    <polyline points="16,58 40,56 64,52 88,48 112,42 136,36 152,32" fill="none" stroke="#6366A8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <text x="84" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="23" fill="#1A1D2E" font-weight="700">Mentoring</text>
    <text x="84" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="21" fill="#6B7085">멘토링</text>
  </g>

  <!-- Understated -->
  <g transform="translate(196, 106)">
    <rect width="168" height="80" rx="12" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <!-- Minimal: single thin line + small dot -->
    <line x1="28" y1="46" x2="140" y2="46" stroke="#3B3F8C" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <circle cx="84" cy="46" r="3" fill="#D4A843"/>
    <text x="84" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="23" fill="#1A1D2E" font-weight="700">Understated</text>
    <text x="84" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="21" fill="#6B7085">절제된</text>
  </g>

  <!-- Trustworthy -->
  <g transform="translate(378, 106)">
    <rect width="168" height="80" rx="12" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <!-- Shield shape -->
    <path d="M 72,30 L 96,30 L 96,54 L 84,62 L 72,54 Z" fill="none" stroke="#3B3F8C" stroke-width="1.5" stroke-linejoin="round"/>
    <polyline points="78,46 82,50 90,42" fill="none" stroke="#D4A843" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="84" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="23" fill="#1A1D2E" font-weight="700">Trustworthy</text>
    <text x="84" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="21" fill="#6B7085">신뢰할 수 있는</text>
  </g>
</svg>
