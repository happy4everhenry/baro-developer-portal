<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <rect width="480" height="200" rx="16" fill="#F8F9FC"/>

  <!-- Stacked bar -->
  <rect x="20" y="20" width="264" height="48" rx="8" fill="#1A1D2E"/>
  <text x="152" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="#FFFFFF" font-weight="700">60%</text>
  <text x="152" y="56" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="#9CA3B8" font-weight="500">Neutrals</text>

  <rect x="288" y="20" width="132" height="48" rx="8" fill="#3B3F8C"/>
  <text x="354" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="#FFFFFF" font-weight="700">30%</text>
  <text x="354" y="56" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="#9CA3B8" font-weight="500">Primary</text>

  <rect x="424" y="20" width="36" height="48" rx="8" fill="#D4A843"/>
  <text x="442" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">10%</text>
  <text x="442" y="54" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#FFFFFF" font-weight="500" opacity="0.8">Accent</text>

  <!-- Divider -->
  <line x1="20" y1="82" x2="460" y2="82" stroke="#E2E4ED" stroke-width="1"/>

  <!-- Description cards -->
  <!-- Neutrals -->
  <g transform="translate(20, 94)">
    <rect width="140" height="88" rx="8" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <g transform="translate(10, 12)">
      <rect width="10" height="10" rx="2" fill="#0F1018"/>
      <rect x="13" width="10" height="10" rx="2" fill="#1A1D2E"/>
      <rect x="26" width="10" height="10" rx="2" fill="#6B7085"/>
      <rect x="39" width="10" height="10" rx="2" fill="#9CA3B8"/>
      <rect x="52" width="10" height="10" rx="2" fill="#E2E4ED" stroke="#D0D3DE" stroke-width="0.5"/>
      <rect x="65" width="10" height="10" rx="2" fill="#F8F9FC" stroke="#E2E4ED" stroke-width="0.5"/>
    </g>
    <text x="10" y="38" font-family="Inter, sans-serif" font-size="15" fill="#1A1D2E" font-weight="600">60% — Neutrals</text>
    <text x="10" y="52" font-family="Inter, sans-serif" font-size="18" fill="#6B7085">Slate 900 to Slate 50.</text>
    <text x="10" y="64" font-family="Inter, sans-serif" font-size="18" fill="#6B7085">Canvas, text, borders —</text>
    <text x="10" y="76" font-family="Inter, sans-serif" font-size="18" fill="#6B7085">the calm foundation.</text>
  </g>

  <!-- Primary -->
  <g transform="translate(172, 94)">
    <rect width="140" height="88" rx="8" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <g transform="translate(10, 12)">
      <rect width="10" height="10" rx="2" fill="#3B3F8C"/>
      <rect x="13" width="10" height="10" rx="2" fill="#6366A8"/>
    </g>
    <text x="10" y="38" font-family="Inter, sans-serif" font-size="15" fill="#1A1D2E" font-weight="600">30% — Primary</text>
    <text x="10" y="52" font-family="Inter, sans-serif" font-size="18" fill="#6B7085">Indigo + Indigo Light.</text>
    <text x="10" y="64" font-family="Inter, sans-serif" font-size="18" fill="#6B7085">AI presence, brand elements,</text>
    <text x="10" y="76" font-family="Inter, sans-serif" font-size="18" fill="#6B7085">navigation.</text>
  </g>

  <!-- Accents -->
  <g transform="translate(324, 94)">
    <rect width="136" height="88" rx="8" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <g transform="translate(10, 12)">
      <rect width="10" height="10" rx="2" fill="#D4A843"/>
      <rect x="13" width="10" height="10" rx="2" fill="#3AAFA8"/>
    </g>
    <text x="10" y="38" font-family="Inter, sans-serif" font-size="15" fill="#1A1D2E" font-weight="600">10% — Accents</text>
    <text x="10" y="52" font-family="Inter, sans-serif" font-size="18" fill="#6B7085">Gold + Teal. Signal points,</text>
    <text x="10" y="64" font-family="Inter, sans-serif" font-size="18" fill="#6B7085">data viz, secondary actions.</text>
  </g>
</svg>
