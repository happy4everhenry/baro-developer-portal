<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" width="480" height="280">
  <!-- Type Scale -->
  <rect width="480" height="280" rx="16" fill="#F8F9FC"/>

  <!-- 32px Display -->
  <g transform="translate(20, 20)">
    <text x="0" y="28" font-family="Inter, sans-serif" font-size="32" fill="#1A1D2E" font-weight="300">Display Heading</text>
    <text x="380" y="28" font-family="JetBrains Mono, monospace" font-size="9" fill="#9CA3B8" font-weight="400" text-anchor="end">32px / Light 300</text>
    <line x1="0" y1="40" x2="460" y2="40" stroke="#E2E4ED" stroke-width="1"/>
  </g>

  <!-- 24px Heading -->
  <g transform="translate(20, 72)">
    <text x="0" y="22" font-family="Inter, sans-serif" font-size="24" fill="#1A1D2E" font-weight="400">Section Heading</text>
    <text x="380" y="22" font-family="JetBrains Mono, monospace" font-size="9" fill="#9CA3B8" font-weight="400" text-anchor="end">24px / Regular 400</text>
    <line x1="0" y1="34" x2="460" y2="34" stroke="#E2E4ED" stroke-width="1"/>
  </g>

  <!-- 18px Subheading -->
  <g transform="translate(20, 118)">
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="18" fill="#1A1D2E" font-weight="500">Card Subheading</text>
    <text x="380" y="18" font-family="JetBrains Mono, monospace" font-size="9" fill="#9CA3B8" font-weight="400" text-anchor="end">18px / Medium 500</text>
    <line x1="0" y1="30" x2="460" y2="30" stroke="#E2E4ED" stroke-width="1"/>
  </g>

  <!-- 14px Body -->
  <g transform="translate(20, 160)">
    <text x="0" y="14" font-family="Inter, sans-serif" font-size="14" fill="#1A1D2E" font-weight="400">Body text for paragraphs, descriptions, and general content throughout the interface.</text>
    <text x="380" y="30" font-family="JetBrains Mono, monospace" font-size="9" fill="#9CA3B8" font-weight="400" text-anchor="end">14px / Regular 400</text>
    <line x1="0" y1="42" x2="460" y2="42" stroke="#E2E4ED" stroke-width="1"/>
  </g>

  <!-- 12px Caption -->
  <g transform="translate(20, 214)">
    <text x="0" y="12" font-family="Inter, sans-serif" font-size="12" fill="#6B7085" font-weight="400">Captions, labels, metadata, and small supporting text used for secondary information.</text>
    <text x="380" y="28" font-family="JetBrains Mono, monospace" font-size="9" fill="#9CA3B8" font-weight="400" text-anchor="end">12px / Regular 400</text>
  </g>

  <!-- Size comparison bar on left edge -->
  <rect x="8" y="20" width="3" height="48" rx="1.5" fill="#3B3F8C" opacity="0.6"/>
  <rect x="8" y="72" width="3" height="36" rx="1.5" fill="#3B3F8C" opacity="0.45"/>
  <rect x="8" y="118" width="3" height="28" rx="1.5" fill="#3B3F8C" opacity="0.35"/>
  <rect x="8" y="160" width="3" height="22" rx="1.5" fill="#3B3F8C" opacity="0.25"/>
  <rect x="8" y="214" width="3" height="16" rx="1.5" fill="#3B3F8C" opacity="0.15"/>
</svg>
