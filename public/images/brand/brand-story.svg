<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <rect width="480" height="160" rx="16" fill="#F8F9FC"/>

  <!-- 4 steps of the brand story -->
  <!-- Problem -->
  <g transform="translate(16, 16)">
    <rect width="104" height="128" rx="10" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <rect x="1" y="1" width="102" height="28" rx="9" fill="#EF4444" opacity="0.1"/>
    <text x="52" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#EF4444" font-weight="700">The Problem</text>
    <!-- Chaotic chart -->
    <polyline points="14,58 24,50 34,68 44,42 54,72 64,38 74,65 84,44 92,60" fill="none" stroke="#EF4444" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <text x="52" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="7.5" fill="#6B7085">Emotion-driven</text>
    <text x="52" y="99" text-anchor="middle" font-family="Inter, sans-serif" font-size="7.5" fill="#6B7085">trading. FOMO buys,</text>
    <text x="52" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="7.5" fill="#6B7085">panic sells.</text>
  </g>

  <!-- Arrow -->
  <text x="128" y="82" font-family="Inter, sans-serif" font-size="14" fill="#E2E4ED">→</text>

  <!-- Insight -->
  <g transform="translate(140, 16)">
    <rect width="104" height="128" rx="10" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <rect x="1" y="1" width="102" height="28" rx="9" fill="#D4A843" opacity="0.15"/>
    <text x="52" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#D4A843" font-weight="700">The Insight</text>
    <!-- Golden cross pattern -->
    <line x1="20" y1="70" x2="88" y2="45" stroke="#3B3F8C" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="20" y1="50" x2="88" y2="60" stroke="#6366A8" stroke-width="1" stroke-linecap="round" stroke-dasharray="3 2"/>
    <circle cx="58" cy="55" r="4" fill="#D4A843"/>
    <text x="52" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="7.5" fill="#6B7085">정석 (Jeongseok):</text>
    <text x="52" y="99" text-anchor="middle" font-family="Inter, sans-serif" font-size="7.5" fill="#6B7085">the proven, correct</text>
    <text x="52" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="7.5" fill="#6B7085">approach.</text>
  </g>

  <!-- Arrow -->
  <text x="252" y="82" font-family="Inter, sans-serif" font-size="14" fill="#E2E4ED">→</text>

  <!-- Name -->
  <g transform="translate(264, 16)">
    <rect width="104" height="128" rx="10" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <rect x="1" y="1" width="102" height="28" rx="9" fill="#3B3F8C" opacity="0.1"/>
    <text x="52" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#3B3F8C" font-weight="700">The Name</text>
    <text x="52" y="56" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#3B3F8C" font-weight="700">BARO</text>
    <text x="52" y="72" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#6B7085" font-weight="400">바로 = correctly</text>
    <text x="52" y="94" text-anchor="middle" font-family="Inter, sans-serif" font-size="7.5" fill="#6B7085">See correctly,</text>
    <text x="52" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="7.5" fill="#6B7085">understand correctly,</text>
    <text x="52" y="116" text-anchor="middle" font-family="Inter, sans-serif" font-size="7.5" fill="#6B7085">invest correctly.</text>
  </g>

  <!-- Arrow -->
  <text x="376" y="82" font-family="Inter, sans-serif" font-size="14" fill="#E2E4ED">→</text>

  <!-- Vision -->
  <g transform="translate(388, 16)">
    <rect width="76" height="128" rx="10" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <rect x="1" y="1" width="74" height="28" rx="9" fill="#3AAFA8" opacity="0.15"/>
    <text x="38" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#3AAFA8" font-weight="700">Vision</text>
    <!-- Rising line -->
    <polyline points="14,72 28,65 42,58 56,48 66,40" fill="none" stroke="#3B3F8C" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="66" cy="40" r="3" fill="#D4A843"/>
    <text x="38" y="94" text-anchor="middle" font-family="Inter, sans-serif" font-size="7.5" fill="#6B7085">Investors who</text>
    <text x="38" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="7.5" fill="#6B7085">see the market</text>
    <text x="38" y="116" text-anchor="middle" font-family="Inter, sans-serif" font-size="7.5" fill="#6B7085">correctly.</text>
  </g>
</svg>
