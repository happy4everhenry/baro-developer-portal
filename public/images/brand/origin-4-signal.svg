<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Step 4: Signal Confirmed — crosshair crystallizing, grid forming -->
  <rect width="200" height="200" rx="16" fill="#F8F9FC"/>

  <!-- Grid structure emerging (secondary lines) -->
  <line x1="60" y1="30" x2="60" y2="170" stroke="#3B3F8C" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
  <line x1="140" y1="30" x2="140" y2="170" stroke="#3B3F8C" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
  <line x1="30" y1="60" x2="170" y2="60" stroke="#3B3F8C" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
  <line x1="30" y1="140" x2="170" y2="140" stroke="#3B3F8C" stroke-width="1" stroke-linecap="round" opacity="0.15"/>

  <!-- Primary crosshair lines forming -->
  <line x1="100" y1="30" x2="100" y2="170" stroke="#3B3F8C" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="30" y1="100" x2="170" y2="100" stroke="#3B3F8C" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Gold signal dot — bright and confirmed -->
  <circle cx="100" cy="100" r="10" fill="#D4A843"/>
  <circle cx="100" cy="100" r="16" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="100" r="24" fill="none" stroke="#D4A843" stroke-width="0.5" opacity="0.15"/>

  <!-- Faded trend line remnants -->
  <polyline points="30,140 60,120 100,100 140,85 170,70"
    fill="none" stroke="#3B3F8C" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
  <polyline points="30,65 60,80 100,100 140,112 170,125"
    fill="none" stroke="#D4A843" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
</svg>
