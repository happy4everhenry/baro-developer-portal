  <!-- Scattered volume bars at bottom -->
  <rect x="26" y="158" width="8" height="20" rx="1" fill="#9CA3B8" opacity="0.3"/>
  <rect x="51" y="150" width="8" height="28" rx="1" fill="#9CA3B8" opacity="0.25"/>
  <rect x="76" y="155" width="8" height="23" rx="1" fill="#9CA3B8" opacity="0.3"/>
  <rect x="101" y="148" width="8" height="30" rx="1" fill="#9CA3B8" opacity="0.2"/>
  <rect x="126" y="160" width="8" height="18" rx="1" fill="#9CA3B8" opacity="0.35"/>
  <rect x="151" y="152" width="8" height="26" rx="1" fill="#9CA3B8" opacity="0.25"/>

