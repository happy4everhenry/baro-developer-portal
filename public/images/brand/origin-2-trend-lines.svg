<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Step 2: Trend Lines Emerge — moving averages forming from noise -->
  <rect width="200" height="200" rx="16" fill="#F8F9FC"/>

  <!-- Faded candlesticks (receding noise) -->
  <rect x="26" y="80" width="6" height="25" rx="1" fill="#9CA3B8" opacity="0.15"/>
  <rect x="51" y="70" width="6" height="35" rx="1" fill="#9CA3B8" opacity="0.15"/>
  <rect x="76" y="85" width="6" height="30" rx="1" fill="#9CA3B8" opacity="0.12"/>
  <rect x="101" y="60" width="6" height="28" rx="1" fill="#9CA3B8" opacity="0.12"/>
  <rect x="126" y="90" width="6" height="30" rx="1" fill="#9CA3B8" opacity="0.1"/>
  <rect x="151" y="75" width="6" height="25" rx="1" fill="#9CA3B8" opacity="0.1"/>

  <!-- Short moving average (faster, more volatile) -->
  <polyline points="20,120 45,105 70,115 95,90 120,85 145,95 175,70"
    fill="none" stroke="#3B3F8C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Long moving average (slower, smoother) -->
  <polyline points="20,130 45,125 70,118 95,110 120,100 145,95 175,88"
    fill="none" stroke="#D4A843" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Direction arrows emerging -->
  <line x1="160" y1="75" x2="180" y2="65" stroke="#3B3F8C" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="160" y1="92" x2="180" y2="84" stroke="#D4A843" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
