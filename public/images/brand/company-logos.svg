<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <!-- Company Logo Badges — Recreated from CompanyLogoView.swift -->
  <!-- Three styles: .text(), .initials(), .symbol() -->

  <!-- Samsung (text style) -->
  <circle cx="40" cy="40" r="28" fill="#1428A0"/>
  <text x="40" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="white" letter-spacing="0.3">SAMSUNG</text>

  <!-- SK Hynix (initials style) -->
  <circle cx="120" cy="40" r="28" fill="#E44332"/>
  <text x="120" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="white">SK</text>

  <!-- Hyundai (initials style) -->
  <circle cx="200" cy="40" r="28" fill="#002C5F"/>
  <text x="200" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="white">H</text>

  <!-- LG (initials style) -->
  <circle cx="280" cy="40" r="28" fill="#A50034"/>
  <text x="280" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="white">LG</text>

  <!-- NVIDIA (text style) -->
  <circle cx="360" cy="40" r="28" fill="#76B900"/>
  <text x="360" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="white" letter-spacing="0.3">NVIDIA</text>

  <!-- Apple (initials style) -->
  <circle cx="440" cy="40" r="28" fill="#333333"/>
  <text x="440" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="white">A</text>
</svg>
