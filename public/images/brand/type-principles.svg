<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <!-- Typography Principles -->
  <rect width="480" height="300" rx="16" fill="#F8F9FC"/>

  <!-- Principle 1: Hierarchy through weight -->
  <g transform="translate(20, 20)">
    <rect width="212" height="120" rx="10" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <rect x="1" y="1" width="210" height="30" rx="9" fill="#3B3F8C"/>
    <text x="12" y="20" font-family="Inter, sans-serif" font-size="19" fill="#FFFFFF" font-weight="600">HIERARCHY THROUGH WEIGHT</text>
    <!-- Demo: same size, different weights -->
    <text x="12" y="52" font-family="Inter, sans-serif" font-size="19" fill="#1A1D2E" font-weight="700">Portfolio Summary</text>
    <text x="12" y="70" font-family="Inter, sans-serif" font-size="19" fill="#1A1D2E" font-weight="500">Total asset value</text>
    <text x="12" y="88" font-family="Inter, sans-serif" font-size="19" fill="#6B7085" font-weight="400">Updated 3 min ago</text>
    <text x="12" y="110" font-family="Inter, sans-serif" font-size="18" fill="#9CA3B8">Same size (14px), weight creates contrast</text>
  </g>

  <!-- Principle 2: Korean + English harmony -->
  <g transform="translate(248, 20)">
    <rect width="212" height="120" rx="10" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <rect x="1" y="1" width="210" height="30" rx="9" fill="#3AAFA8"/>
    <text x="12" y="20" font-family="Inter, sans-serif" font-size="19" fill="#FFFFFF" font-weight="600">KOREAN + ENGLISH HARMONY</text>
    <!-- Demo: mixed scripts aligned -->
    <text x="12" y="56" font-family="Inter, sans-serif" font-size="19" fill="#1A1D2E" font-weight="600">BARO AI &#xBD84;&#xC11D;</text>
    <text x="12" y="76" font-family="Inter, sans-serif" font-size="17" fill="#6B7085" font-weight="400">&#xC624;&#xB298;&#xC758; &#xC2DC;&#xC7A5; &#xD750;&#xB984; / Market Trend</text>
    <line x1="12" y1="62" x2="200" y2="62" stroke="#3AAFA8" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
    <line x1="12" y1="82" x2="200" y2="82" stroke="#3AAFA8" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>
    <text x="12" y="110" font-family="Inter, sans-serif" font-size="18" fill="#9CA3B8">Noto Sans KR aligns with Inter at same size</text>
  </g>

  <!-- Principle 3: Monospace for numbers -->
  <g transform="translate(20, 158)">
    <rect width="212" height="120" rx="10" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <rect x="1" y="1" width="210" height="30" rx="9" fill="#D4A843"/>
    <text x="12" y="20" font-family="Inter, sans-serif" font-size="19" fill="#FFFFFF" font-weight="600">MONOSPACE FOR NUMBERS</text>
    <!-- Demo: aligned financial data -->
    <text x="12" y="54" font-family="JetBrains Mono, monospace" font-size="16" fill="#1A1D2E" font-weight="400">&#8361; 52,400</text>
    <text x="140" y="54" font-family="JetBrains Mono, monospace" font-size="16" fill="#E04848" font-weight="500">+2.34%</text>
    <text x="12" y="70" font-family="JetBrains Mono, monospace" font-size="16" fill="#1A1D2E" font-weight="400">&#8361; 31,250</text>
    <text x="140" y="70" font-family="JetBrains Mono, monospace" font-size="16" fill="#3478F6" font-weight="500">-0.87%</text>
    <text x="12" y="86" font-family="JetBrains Mono, monospace" font-size="16" fill="#1A1D2E" font-weight="400">&#8361;  8,900</text>
    <text x="140" y="86" font-family="JetBrains Mono, monospace" font-size="16" fill="#E04848" font-weight="500">+5.10%</text>
    <text x="12" y="110" font-family="Inter, sans-serif" font-size="18" fill="#9CA3B8">Columns align perfectly with monospace</text>
  </g>

  <!-- Principle 4: No decorative fonts -->
  <g transform="translate(248, 158)">
    <rect width="212" height="120" rx="10" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <rect x="1" y="1" width="210" height="30" rx="9" fill="#1A1D2E"/>
    <text x="12" y="20" font-family="Inter, sans-serif" font-size="19" fill="#FFFFFF" font-weight="600">NO DECORATIVE FONTS</text>
    <!-- Do: clean Inter -->
    <text x="12" y="54" font-family="Inter, sans-serif" font-size="17" fill="#1A1D2E" font-weight="500">AI Signal Detected</text>
    <circle cx="200" cy="50" r="6" fill="#FFFFFF" stroke="#3B3F8C" stroke-width="1.5"/>
    <line x1="197" y1="50" x2="203" y2="50" stroke="#3B3F8C" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="200" y1="47" x2="200" y2="53" stroke="#3B3F8C" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Don't: decorative script -->
    <text x="12" y="78" font-family="Georgia, serif" font-size="17" fill="#9CA3B8" font-style="italic" text-decoration="line-through">Trading Made Easy!</text>
    <line x1="155" y1="68" x2="175" y2="84" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="175" y1="68" x2="155" y2="84" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
    <text x="12" y="110" font-family="Inter, sans-serif" font-size="18" fill="#9CA3B8">Analytical, precise, trustworthy -- never playful</text>
  </g>
</svg>
