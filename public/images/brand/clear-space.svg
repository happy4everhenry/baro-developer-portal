<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <!-- Clear Space & Minimum Size diagram -->
  <rect width="400" height="260" rx="16" fill="#F8F9FC"/>

  <!-- Clear space zone (dashed border) -->
  <rect x="100" y="30" width="200" height="200" rx="4" fill="none" stroke="#3B3F8C" stroke-width="1" stroke-dasharray="6 4" opacity="0.3"/>

  <!-- 1x markers -->
  <!-- Top -->
  <line x1="150" y1="30" x2="150" y2="60" stroke="#D4A843" stroke-width="1"/>
  <line x1="145" y1="30" x2="155" y2="30" stroke="#D4A843" stroke-width="1"/>
  <line x1="145" y1="60" x2="155" y2="60" stroke="#D4A843" stroke-width="1"/>
  <text x="160" y="50" font-family="Inter, sans-serif" font-size="9" fill="#D4A843" font-weight="600">1x</text>

  <!-- Left -->
  <line x1="100" y1="100" x2="130" y2="100" stroke="#D4A843" stroke-width="1"/>
  <line x1="100" y1="95" x2="100" y2="105" stroke="#D4A843" stroke-width="1"/>
  <line x1="130" y1="95" x2="130" y2="105" stroke="#D4A843" stroke-width="1"/>
  <text x="108" y="93" font-family="Inter, sans-serif" font-size="9" fill="#D4A843" font-weight="600">1x</text>

  <!-- Right -->
  <line x1="270" y1="100" x2="300" y2="100" stroke="#D4A843" stroke-width="1"/>
  <line x1="270" y1="95" x2="270" y2="105" stroke="#D4A843" stroke-width="1"/>
  <line x1="300" y1="95" x2="300" y2="105" stroke="#D4A843" stroke-width="1"/>
  <text x="278" y="93" font-family="Inter, sans-serif" font-size="9" fill="#D4A843" font-weight="600">1x</text>

  <!-- Bottom -->
  <line x1="250" y1="200" x2="250" y2="230" stroke="#D4A843" stroke-width="1"/>
  <line x1="245" y1="200" x2="255" y2="200" stroke="#D4A843" stroke-width="1"/>
  <line x1="245" y1="230" x2="255" y2="230" stroke="#D4A843" stroke-width="1"/>
  <text x="256" y="220" font-family="Inter, sans-serif" font-size="9" fill="#D4A843" font-weight="600">1x</text>

  <!-- The BARO mark centered -->
  <g transform="translate(130, 60) scale(1.75)">
    <line x1="20" y1="8" x2="20" y2="72" stroke="#3B3F8C" stroke-opacity="0.25" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="60" y1="8" x2="60" y2="72" stroke="#3B3F8C" stroke-opacity="0.25" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="20" x2="72" y2="20" stroke="#3B3F8C" stroke-opacity="0.25" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="60" x2="72" y2="60" stroke="#3B3F8C" stroke-opacity="0.25" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="8" x2="40" y2="72" stroke="#3B3F8C" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="40" x2="72" y2="40" stroke="#3B3F8C" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="40" cy="40" r="8" fill="#D4A843"/>
  </g>

  <!-- Label -->
  <text x="200" y="252" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6B7085" font-weight="500">1x clear space on all sides</text>
</svg>
