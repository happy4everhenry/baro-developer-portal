<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" width="480" height="220">
  <rect width="480" height="220" rx="16" fill="#F8F9FC"/>

  <!-- Title bar -->
  <text x="20" y="24" font-family="Inter, sans-serif" font-size="11" fill="#1A1D2E" font-weight="700">Correct Usage</text>
  <text x="130" y="24" font-family="Inter, sans-serif" font-size="9" fill="#6B7085" font-weight="400">Full color on light/dark, monochrome variants. Always maintain clear space and locked proportions.</text>

  <!-- 1: Full color on light -->
  <g transform="translate(20, 40)">
    <rect width="100" height="100" rx="12" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <g transform="translate(22, 22) scale(0.7)">
      <line x1="20" y1="8" x2="20" y2="72" stroke="#3B3F8C" stroke-opacity="0.25" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="60" y1="8" x2="60" y2="72" stroke="#3B3F8C" stroke-opacity="0.25" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="20" x2="72" y2="20" stroke="#3B3F8C" stroke-opacity="0.25" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="60" x2="72" y2="60" stroke="#3B3F8C" stroke-opacity="0.25" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="40" y1="8" x2="40" y2="72" stroke="#3B3F8C" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="8" y1="40" x2="72" y2="40" stroke="#3B3F8C" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="40" cy="40" r="8" fill="#D4A843"/>
    </g>
    <text x="50" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#1A1D2E" font-weight="600">On Light</text>
    <text x="50" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#9CA3B8">Full color, white BG</text>
  </g>

  <!-- 2: Full color on dark -->
  <g transform="translate(135, 40)">
    <rect width="100" height="100" rx="12" fill="#1E2158"/>
    <g transform="translate(22, 22) scale(0.7)">
      <line x1="20" y1="8" x2="20" y2="72" stroke="#6366A8" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="60" y1="8" x2="60" y2="72" stroke="#6366A8" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="20" x2="72" y2="20" stroke="#6366A8" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="60" x2="72" y2="60" stroke="#6366A8" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="40" y1="8" x2="40" y2="72" stroke="#6366A8" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="8" y1="40" x2="72" y2="40" stroke="#6366A8" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="40" cy="40" r="8" fill="#D4A843"/>
    </g>
    <text x="50" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#1A1D2E" font-weight="600">On Dark</text>
    <text x="50" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#9CA3B8">Full color, indigo BG</text>
  </g>

  <!-- 3: Monochrome white -->
  <g transform="translate(250, 40)">
    <rect width="100" height="100" rx="12" fill="#0F1117"/>
    <g transform="translate(22, 22) scale(0.7)">
      <line x1="20" y1="8" x2="20" y2="72" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="60" y1="8" x2="60" y2="72" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="20" x2="72" y2="20" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="60" x2="72" y2="60" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="40" y1="8" x2="40" y2="72" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="8" y1="40" x2="72" y2="40" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="40" cy="40" r="8" fill="#FFFFFF"/>
    </g>
    <text x="50" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#1A1D2E" font-weight="600">Mono White</text>
    <text x="50" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#9CA3B8">White on dark surfaces</text>
  </g>

  <!-- 4: Monochrome dark -->
  <g transform="translate(365, 40)">
    <rect width="100" height="100" rx="12" fill="#F8F9FC" stroke="#E2E4ED" stroke-width="1"/>
    <g transform="translate(22, 22) scale(0.7)">
      <line x1="20" y1="8" x2="20" y2="72" stroke="#1A1D2E" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="60" y1="8" x2="60" y2="72" stroke="#1A1D2E" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="20" x2="72" y2="20" stroke="#1A1D2E" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="60" x2="72" y2="60" stroke="#1A1D2E" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="40" y1="8" x2="40" y2="72" stroke="#1A1D2E" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="8" y1="40" x2="72" y2="40" stroke="#1A1D2E" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="40" cy="40" r="8" fill="#1A1D2E"/>
    </g>
    <text x="50" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#1A1D2E" font-weight="600">Mono Dark</text>
    <text x="50" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#9CA3B8">Dark on light surfaces</text>
  </g>
</svg>
