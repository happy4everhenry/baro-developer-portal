<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 252" width="560" height="252">
  <rect width="560" height="252" rx="16" fill="#F8F9FC"/>

  <!-- WHAT WE ARE -->
  <g transform="translate(14, 14)">
    <rect width="256" height="224" rx="14" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <rect x="1" y="1" width="254" height="42" rx="13" fill="#3B3F8C"/>
    <circle cx="26" cy="22" r="11" fill="#FFFFFF" fill-opacity="0.2"/>
    <polyline points="21,22 24,25 31,18" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="44" y="27" font-family="Inter, sans-serif" font-size="19" fill="#FFFFFF" font-weight="700">What We Are</text>

    <!-- AI narrates scene -->
    <g transform="translate(16, 56)">
      <!-- Phone frame -->
      <rect width="100" height="180" rx="12" fill="#0F1018" stroke="#1A1D2E" stroke-width="1"/>
      <!-- Chart inside -->
      <polyline points="12,120 28,110 46,102 64,86 80,70 92,56" fill="none" stroke="#3B3F8C" stroke-width="2" stroke-linecap="round"/>
      <polygon points="12,120 28,110 46,102 64,86 80,70 92,56 92,135 12,135" fill="#3B3F8C" fill-opacity="0.1"/>
      <circle cx="80" cy="70" r="4" fill="#D4A843"/>
      <!-- AI narration bubble -->
      <rect x="8" y="16" width="84" height="28" rx="7" fill="#3B3F8C" opacity="0.9"/>
      <text x="50" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" fill="#FFFFFF" font-weight="500">AI is narrating...</text>
      <!-- Screen labels -->
      <rect x="10" y="148" width="36" height="10" rx="3" fill="#6366A8" opacity="0.3"/>
      <rect x="52" y="148" width="28" height="10" rx="3" fill="#D4A843" opacity="0.3"/>
    </g>

    <!-- Description -->
    <text x="128" y="74" font-family="Inter, sans-serif" font-size="17" fill="#1A1D2E" font-weight="700">AI-guided investing</text>
    <text x="128" y="92" font-family="Inter, sans-serif" font-size="17" fill="#1A1D2E" font-weight="700">companion</text>

    <text x="128" y="118" font-family="Inter, sans-serif" font-size="16" fill="#6B7085">AI narrates while</text>
    <text x="128" y="134" font-family="Inter, sans-serif" font-size="16" fill="#6B7085">the UI responds —</text>
    <text x="128" y="150" font-family="Inter, sans-serif" font-size="16" fill="#6B7085">charts, data, screens</text>
    <text x="128" y="166" font-family="Inter, sans-serif" font-size="16" fill="#6B7085">move in sync.</text>

    <text x="128" y="194" font-family="Inter, sans-serif" font-size="16" fill="#6B7085">Like a scholar guiding</text>
    <text x="128" y="210" font-family="Inter, sans-serif" font-size="16" fill="#6B7085">the proven approach</text>
    <text x="128" y="226" font-family="Inter, sans-serif" font-size="16" fill="#6B7085">to investing.</text>
  </g>

  <!-- WHAT WE ARE NOT -->
  <g transform="translate(290, 14)">
    <rect width="256" height="224" rx="14" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <rect x="1" y="1" width="254" height="42" rx="13" fill="#EF4444" opacity="0.9"/>
    <circle cx="26" cy="22" r="11" fill="#FFFFFF" fill-opacity="0.2"/>
    <line x1="21" y1="17" x2="31" y2="27" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="31" y1="17" x2="21" y2="27" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <text x="44" y="27" font-family="Inter, sans-serif" font-size="19" fill="#FFFFFF" font-weight="700">What We Are Not</text>

    <!-- Anti-patterns -->
    <g transform="translate(16, 56)">
      <!-- Gamified app mockup -->
      <rect width="100" height="180" rx="12" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
      <!-- Confetti -->
      <rect x="18" y="22" width="14" height="14" rx="2" fill="#EF4444" opacity="0.4" transform="rotate(15 25 29)"/>
      <rect x="52" y="18" width="11" height="11" rx="2" fill="#F59E0B" opacity="0.5" transform="rotate(-20 57 23)"/>
      <rect x="76" y="28" width="12" height="12" rx="2" fill="#10B981" opacity="0.4" transform="rotate(30 82 34)"/>
      <!-- Hype text -->
      <text x="50" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#EF4444" font-weight="700" font-style="italic">BUY NOW!</text>
      <text x="50" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#F59E0B" font-weight="700">+999%</text>
      <!-- Social feed lines -->
      <rect x="10" y="115" width="80" height="8" rx="3" fill="#EF4444" opacity="0.1"/>
      <rect x="10" y="128" width="64" height="8" rx="3" fill="#EF4444" opacity="0.1"/>
      <rect x="10" y="141" width="72" height="8" rx="3" fill="#EF4444" opacity="0.1"/>
      <!-- X overlay -->
      <line x1="10" y1="10" x2="90" y2="170" stroke="#EF4444" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
      <line x1="90" y1="10" x2="10" y2="170" stroke="#EF4444" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
    </g>

    <!-- Description -->
    <text x="128" y="74" font-family="Inter, sans-serif" font-size="17" fill="#EF4444" font-weight="700">Not a gamified</text>
    <text x="128" y="92" font-family="Inter, sans-serif" font-size="17" fill="#EF4444" font-weight="700">trading app</text>

    <text x="128" y="118" font-family="Inter, sans-serif" font-size="16" fill="#6B7085">Not a passive dashboard.</text>
    <text x="128" y="134" font-family="Inter, sans-serif" font-size="16" fill="#6B7085">Not a social trading</text>
    <text x="128" y="150" font-family="Inter, sans-serif" font-size="16" fill="#6B7085">platform driven by</text>
    <text x="128" y="166" font-family="Inter, sans-serif" font-size="16" fill="#6B7085">herd mentality.</text>

    <text x="128" y="194" font-family="Inter, sans-serif" font-size="16" fill="#6B7085">We fight FOMO, FUD,</text>
    <text x="128" y="210" font-family="Inter, sans-serif" font-size="16" fill="#6B7085">and gambling-style UX.</text>
  </g>
</svg>
