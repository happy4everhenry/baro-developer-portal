<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 234" width="480" height="234">
  <rect width="480" height="234" rx="16" fill="#F8F9FC"/>

  <!-- WHAT WE ARE -->
  <g transform="translate(12, 12)">
    <rect width="220" height="210" rx="12" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <rect x="1" y="1" width="218" height="34" rx="11" fill="#3B3F8C"/>
    <circle cx="22" cy="18" r="9" fill="#FFFFFF" fill-opacity="0.2"/>
    <polyline points="18,18 21,21 27,15" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="38" y="22" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF" font-weight="700">What We Are</text>

    <!-- AI narrates scene -->
    <g transform="translate(14, 46)">
      <!-- Phone frame -->
      <rect width="88" height="150" rx="10" fill="#0F1018" stroke="#1A1D2E" stroke-width="1"/>
      <!-- Chart inside -->
      <polyline points="10,100 25,92 40,85 55,72 70,58 80,48" fill="none" stroke="#3B3F8C" stroke-width="1.5" stroke-linecap="round"/>
      <polygon points="10,100 25,92 40,85 55,72 70,58 80,48 80,110 10,110" fill="#3B3F8C" fill-opacity="0.1"/>
      <circle cx="70" cy="58" r="3" fill="#D4A843"/>
      <!-- AI narration bubble -->
      <rect x="8" y="14" width="72" height="24" rx="6" fill="#3B3F8C" opacity="0.9"/>
      <text x="44" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#FFFFFF" font-weight="500">AI is narrating...</text>
      <!-- Screen labels -->
      <rect x="8" y="120" width="30" height="8" rx="2" fill="#6366A8" opacity="0.3"/>
      <rect x="42" y="120" width="24" height="8" rx="2" fill="#D4A843" opacity="0.3"/>
    </g>

    <!-- Description -->
    <text x="112" y="60" font-family="Inter, sans-serif" font-size="9" fill="#1A1D2E" font-weight="600">AI-guided investing</text>
    <text x="112" y="74" font-family="Inter, sans-serif" font-size="9" fill="#1A1D2E" font-weight="600">companion</text>

    <text x="112" y="96" font-family="Inter, sans-serif" font-size="8.5" fill="#6B7085">AI narrates while</text>
    <text x="112" y="110" font-family="Inter, sans-serif" font-size="8.5" fill="#6B7085">the UI responds —</text>
    <text x="112" y="124" font-family="Inter, sans-serif" font-size="8.5" fill="#6B7085">charts, data, screens</text>
    <text x="112" y="138" font-family="Inter, sans-serif" font-size="8.5" fill="#6B7085">move in sync.</text>

    <text x="112" y="160" font-family="Inter, sans-serif" font-size="8.5" fill="#6B7085">Like a scholar guiding</text>
    <text x="112" y="174" font-family="Inter, sans-serif" font-size="8.5" fill="#6B7085">the proven approach</text>
    <text x="112" y="188" font-family="Inter, sans-serif" font-size="8.5" fill="#6B7085">to investing.</text>
  </g>

  <!-- WHAT WE ARE NOT -->
  <g transform="translate(248, 12)">
    <rect width="220" height="210" rx="12" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>
    <rect x="1" y="1" width="218" height="34" rx="11" fill="#EF4444" opacity="0.9"/>
    <circle cx="22" cy="18" r="9" fill="#FFFFFF" fill-opacity="0.2"/>
    <line x1="18" y1="14" x2="26" y2="22" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="26" y1="14" x2="18" y2="22" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    <text x="38" y="22" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF" font-weight="700">What We Are Not</text>

    <!-- Anti-patterns -->
    <g transform="translate(14, 46)">
      <!-- Gamified app mockup -->
      <rect width="88" height="150" rx="10" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
      <!-- Confetti -->
      <rect x="15" y="20" width="10" height="10" rx="1" fill="#EF4444" opacity="0.4" transform="rotate(15 20 25)"/>
      <rect x="45" y="15" width="8" height="8" rx="1" fill="#F59E0B" opacity="0.5" transform="rotate(-20 49 19)"/>
      <rect x="65" y="25" width="9" height="9" rx="1" fill="#10B981" opacity="0.4" transform="rotate(30 69 29)"/>
      <!-- Hype text -->
      <text x="44" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#EF4444" font-weight="700" font-style="italic">BUY NOW!</text>
      <text x="44" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#F59E0B" font-weight="700">🚀 +999%</text>
      <!-- Social feed lines -->
      <rect x="8" y="95" width="72" height="6" rx="2" fill="#EF4444" opacity="0.1"/>
      <rect x="8" y="105" width="56" height="6" rx="2" fill="#EF4444" opacity="0.1"/>
      <rect x="8" y="115" width="64" height="6" rx="2" fill="#EF4444" opacity="0.1"/>
      <!-- X overlay -->
      <line x1="10" y1="10" x2="78" y2="140" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
      <line x1="78" y1="10" x2="10" y2="140" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    </g>

    <!-- Description -->
    <text x="112" y="60" font-family="Inter, sans-serif" font-size="9" fill="#EF4444" font-weight="600">Not a gamified</text>
    <text x="112" y="74" font-family="Inter, sans-serif" font-size="9" fill="#EF4444" font-weight="600">trading app</text>

    <text x="112" y="96" font-family="Inter, sans-serif" font-size="8.5" fill="#6B7085">Not a passive dashboard.</text>
    <text x="112" y="110" font-family="Inter, sans-serif" font-size="8.5" fill="#6B7085">Not a social trading</text>
    <text x="112" y="124" font-family="Inter, sans-serif" font-size="8.5" fill="#6B7085">platform driven by</text>
    <text x="112" y="138" font-family="Inter, sans-serif" font-size="8.5" fill="#6B7085">herd mentality.</text>

    <text x="112" y="160" font-family="Inter, sans-serif" font-size="8.5" fill="#6B7085">We fight FOMO, FUD,</text>
    <text x="112" y="174" font-family="Inter, sans-serif" font-size="8.5" fill="#6B7085">and gambling-style UX.</text>
  </g>
</svg>
