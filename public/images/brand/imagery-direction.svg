<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260">
  <rect width="480" height="260" rx="16" fill="#F8F9FC"/>

  <!-- DO side -->
  <g transform="translate(12, 12)">
    <rect width="220" height="236" rx="12" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>

    <!-- Header -->
    <rect x="1" y="1" width="218" height="32" rx="11" fill="#3B3F8C"/>
    <circle cx="20" cy="17" r="8" fill="#FFFFFF" fill-opacity="0.2"/>
    <polyline points="17,17 19,19 24,14" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="34" y="21" font-family="Inter, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">Do</text>

    <!-- Description -->
    <text x="14" y="52" font-family="Inter, sans-serif" font-size="19" fill="#1A1D2E" font-weight="500">Data visualizations, abstract charts.</text>
    <text x="14" y="64" font-family="Inter, sans-serif" font-size="19" fill="#1A1D2E" font-weight="500">Korean urban/financial landscapes.</text>
    <text x="14" y="76" font-family="Inter, sans-serif" font-size="19" fill="#6B7085">Muted tones, indigo + gold highlights.</text>
    <text x="14" y="88" font-family="Inter, sans-serif" font-size="19" fill="#6B7085">Clean, composed, never chaotic.</text>

    <!-- Visual: calm chart -->
    <rect x="14" y="98" width="192" height="124" rx="8" fill="#0F1018"/>

    <!-- Grid -->
    <line x1="26" y1="120" x2="194" y2="120" stroke="#3B3F8C" stroke-opacity="0.12" stroke-width="0.5"/>
    <line x1="26" y1="145" x2="194" y2="145" stroke="#3B3F8C" stroke-opacity="0.12" stroke-width="0.5"/>
    <line x1="26" y1="170" x2="194" y2="170" stroke="#3B3F8C" stroke-opacity="0.12" stroke-width="0.5"/>
    <line x1="26" y1="195" x2="194" y2="195" stroke="#3B3F8C" stroke-opacity="0.12" stroke-width="0.5"/>

    <!-- Trend line -->
    <polyline points="30,188 55,180 80,174 105,162 130,154 155,138 180,118 194,110" fill="none" stroke="#3B3F8C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="30,194 55,188 80,182 105,176 130,172 155,164 180,150 194,140" fill="none" stroke="#6366A8" stroke-width="1" stroke-opacity="0.4" stroke-linecap="round"/>

    <!-- Area fill -->
    <polygon points="30,188 55,180 80,174 105,162 130,154 155,138 180,118 194,110 194,200 30,200" fill="#3B3F8C" fill-opacity="0.08"/>

    <!-- Gold signal -->
    <circle cx="180" cy="118" r="4" fill="#D4A843"/>
    <circle cx="180" cy="118" r="7" fill="none" stroke="#D4A843" stroke-width="0.5" stroke-opacity="0.5"/>

    <!-- Muted cityscape -->
    <rect x="30" y="188" width="8" height="12" fill="#1A1D2E" opacity="0.15"/>
    <rect x="40" y="184" width="6" height="16" fill="#1A1D2E" opacity="0.12"/>
    <rect x="48" y="190" width="10" height="10" fill="#1A1D2E" opacity="0.1"/>
    <rect x="60" y="182" width="5" height="18" fill="#1A1D2E" opacity="0.13"/>
  </g>

  <!-- DON'T side -->
  <g transform="translate(248, 12)">
    <rect width="220" height="236" rx="12" fill="#FFFFFF" stroke="#E2E4ED" stroke-width="1"/>

    <!-- Header -->
    <rect x="1" y="1" width="218" height="32" rx="11" fill="#EF4444"/>
    <circle cx="20" cy="17" r="8" fill="#FFFFFF" fill-opacity="0.2"/>
    <line x1="16" y1="13" x2="24" y2="21" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="13" x2="16" y2="21" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
    <text x="34" y="21" font-family="Inter, sans-serif" font-size="16" fill="#FFFFFF" font-weight="700">Don't</text>

    <!-- Description -->
    <text x="14" y="52" font-family="Inter, sans-serif" font-size="19" fill="#1A1D2E" font-weight="500">No celebrations or hype imagery.</text>
    <text x="14" y="64" font-family="Inter, sans-serif" font-size="19" fill="#1A1D2E" font-weight="500">No stock photos of people trading.</text>
    <text x="14" y="76" font-family="Inter, sans-serif" font-size="19" fill="#6B7085">No rapid-fire flashy animations.</text>
    <text x="14" y="88" font-family="Inter, sans-serif" font-size="19" fill="#6B7085">Nothing contradicting calm investing.</text>

    <!-- Visual: chaotic hype -->
    <rect x="14" y="98" width="192" height="124" rx="8" fill="#FEF2F2"/>

    <!-- Confetti chaos -->
    <rect x="30" y="112" width="16" height="16" rx="2" fill="#EF4444" opacity="0.6" transform="rotate(15 38 120)"/>
    <rect x="70" y="108" width="12" height="12" rx="2" fill="#F59E0B" opacity="0.7" transform="rotate(-20 76 114)"/>
    <rect x="120" y="116" width="14" height="14" rx="2" fill="#10B981" opacity="0.6" transform="rotate(30 127 123)"/>
    <rect x="160" y="110" width="10" height="10" rx="2" fill="#8B5CF6" opacity="0.7" transform="rotate(-10 165 115)"/>
    <circle cx="50" cy="152" r="6" fill="#F59E0B" opacity="0.5"/>
    <circle cx="100" cy="138" r="5" fill="#EF4444" opacity="0.4"/>
    <circle cx="145" cy="158" r="7" fill="#10B981" opacity="0.5"/>
    <circle cx="180" cy="142" r="4" fill="#8B5CF6" opacity="0.6"/>

    <!-- Hype text -->
    <text x="110" y="182" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#EF4444" font-weight="700" font-style="italic">TO THE MOON!</text>
    <text x="110" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#F59E0B" font-weight="700">+9999%</text>

    <!-- Red X -->
    <line x1="34" y1="118" x2="186" y2="198" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <line x1="186" y1="118" x2="34" y2="198" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>
